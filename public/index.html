<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tahiti & Moorea — Travel Planner</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <!-- App -->
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="app">

  <!-- ═══ MAP VIEW ═══ -->
  <div id="v-map" class="view active">
    <div id="map"></div>

    <div class="map-controls">
      <!-- Row 1 : mode toggle + compteur -->
      <div class="map-top">
        <div class="mode-toggle" id="mode-toggle">
          <button class="mode-btn active" data-mode="mine">📍 Mes lieux</button>
          <button class="mode-btn" data-mode="explore">🔍 Explorer</button>
        </div>
        <button class="map-pill map-addcustom" id="btn-addcustom">+ Lieu</button>
      </div>

      <!-- Row 2 : sélecteur d'île -->
      <div class="island-toggle" id="island-toggle">
        <button class="isl-btn active" data-isl="all">🏝️ Tout</button>
        <button class="isl-btn" data-isl="tahiti">Tahiti</button>
        <button class="isl-btn" data-isl="moorea">Moorea</button>
      </div>

      <!-- Row 3 : barre de recherche (explore only) -->
      <div class="map-search" id="map-search">
        <div class="si-wrap">
          <input id="sinput" type="text" placeholder="Plage, restaurant, randonnée…">
          <button class="sclear" id="btn-sclear">✕</button>
        </div>
      </div>

      <!-- Row 3 : filtres catégories (toujours visible) -->
      <div class="map-filters" id="map-filters">
        <button class="mfc active" data-cat="all">Tout</button>
        <button class="mfc" data-cat="beach">🏖️ Plage</button>
        <button class="mfc" data-cat="restaurant">🍹 Resto</button>
        <button class="mfc" data-cat="hike">🥾 Rando</button>
        <button class="mfc" data-cat="culture">🏛️ Culture</button>
        <button class="mfc" data-cat="snorkel">🤿 Snorkel</button>
        <button class="mfc" data-cat="viewpoint">📸 Vue</button>
        <button class="mfc" data-cat="waterfall">💧 Cascade</button>
        <button class="mfc" data-cat="shop">🛍️ Marché</button>
      </div>
    </div>

    <!-- Bannière mode ajout -->
    <div class="custom-banner" id="custom-banner">📌 Touchez la carte pour placer votre lieu</div>

    <!-- Panneau résultats (explore only) -->
    <div class="map-results" id="map-results">
      <button class="rclose" id="btn-rclose">✕</button>
      <div id="map-results-inner"></div>
    </div>
  </div>

  <!-- ═══ LIST VIEW ═══ -->
  <div id="v-list" class="view">
    <div class="lhdr">
      <div class="ltitle">Ma liste</div>
      <div class="lsub" id="lsub">0 lieu</div>
      <div class="lprog"><div class="lprog-fill" id="lprog"></div></div>
    </div>
    <div class="lfilters" id="lfilters">
      <button class="chip active" data-f="todo">À faire</button>
      <button class="chip" data-f="done">Fait ✓</button>
    </div>
    <div class="lscroll" id="lscroll"></div>
  </div>

  <!-- ═══ DAY VIEW ═══ -->
  <div id="v-day" class="view">
    <div class="lhdr">
      <div class="ltitle">Ma journée</div>
      <div class="lsub" id="dsub">0 lieu planifié</div>
      <div class="lprog"><div class="lprog-fill" id="dprog"></div></div>
    </div>
    <div class="lscroll" id="dscroll"></div>
    <button class="archive-btn" id="btn-archive">📖 Archiver la journée</button>
  </div>

  <!-- ═══ HISTORY VIEW ═══ -->
  <div id="v-history" class="view">
    <div class="lhdr">
      <div class="ltitle">Historique</div>
      <div class="lsub">Vos visites passées</div>
    </div>
    <div class="lscroll" id="hscroll"></div>
    <button class="hclear-btn" id="btn-hclear">🗑️ Vider l'historique</button>
  </div>

  <!-- ═══ BOTTOM NAV (4 onglets) ═══ -->
  <div class="bnav">
    <button class="nb active" data-v="map" id="nav-map">
      <span class="ni">🗺️</span>Carte
    </button>
    <button class="nb" data-v="list" id="nav-list">
      <span class="ni">📋</span>Ma liste
    </button>
    <button class="nb" data-v="day" id="nav-day">
      <span class="ni">☀️</span>Journée
    </button>
    <button class="nb" data-v="history" id="nav-history">
      <span class="ni">📖</span>Historique
    </button>
  </div>

</div>

<!-- ═══ DETAIL OVERLAY + SHEET ═══ -->
<div class="overlay" id="det-ov"></div>
<div class="sheet" id="det-sh">
  <div class="shandle"></div>
  <div id="det-body"></div>
</div>

<!-- ═══ CATEGORY MODAL ═══ -->
<div class="cat-ov" id="cat-ov"></div>
<div class="cat-sh" id="cat-sh">
  <div class="ctitle">Catégorie</div>
  <div class="csub" id="cat-sub"></div>
  <div class="cgrid" id="cat-grid"></div>
</div>

<!-- ═══ CUSTOM PLACE MODAL ═══ -->
<div class="custom-ov" id="custom-ov"></div>
<div class="custom-sh" id="custom-sh">
  <div class="shandle"></div>
  <div class="ctitle">Nouveau lieu</div>
  <div class="csub">Donnez un nom et choisissez une catégorie</div>
  <input type="text" id="custom-name" class="custom-input" placeholder="Nom du lieu…" autocomplete="off">
  <input type="hidden" id="custom-lat">
  <input type="hidden" id="custom-lng">
  <div class="cgrid" id="custom-cats"></div>
  <div class="custom-acts">
    <button class="confirm-btn confirm-cancel" id="btn-custom-cancel">Annuler</button>
    <button class="confirm-btn confirm-add" id="btn-custom-ok">Ajouter</button>
  </div>
</div>

<!-- ═══ CONFIRM POPUP ═══ -->
<div class="confirm-ov" id="confirm-ov"></div>
<div class="confirm-box" id="confirm-box">
  <div class="confirm-icon" id="confirm-icon">🗑️</div>
  <div class="confirm-title" id="confirm-title">Vider l'historique ?</div>
  <div class="confirm-msg" id="confirm-msg">Cette action est irréversible.</div>
  <div class="confirm-acts">
    <button class="confirm-btn confirm-cancel" id="confirm-cancel">Annuler</button>
    <button class="confirm-btn confirm-ok" id="confirm-ok">Confirmer</button>
  </div>
</div>

<!-- ═══ TOAST ═══ -->
<div class="toast" id="toast"></div>

<!-- App logic -->
<script src="/app.js"></script>

</body>
</html>
