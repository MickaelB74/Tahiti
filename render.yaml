databases:
  - name: tahiti-db
    plan: free
    databaseName: tahiti
    user: tahiti_user

services:
  - type: web
    name: tahiti-planner
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tahiti-db
          property: connectionString
